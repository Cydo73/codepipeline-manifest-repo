apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-deployment
  namespace: default
  labels:
    app: amazon-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: amazon-app  # ✅ Must match template labels
      tier: frontend
      version: 1.0.0
  template:
    metadata:
      labels:
        app: amazon-app  # ✅ Matches selector
        tier: frontend
        version: 1.0.0
    spec:
      containers:
      - name: petty-container
        image: mumpecyd/spring-petty:latest
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: petty-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  labels:
    app: amazon-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: spring-petty-app
